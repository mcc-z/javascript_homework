<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/Style2.css">   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../js/authentication.js"></script>

</head>
<body>
    <div class="container">
        <!-- NavigationBar -->
        <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="dashboard.html">Home</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mynavbar">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="page1.html">Page1</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="page2.html">Page2</a>
                        </li>
                        
                    </ul>
                    <div class="d-flex text-white" >
                        <ul class="navbar-nav me-auto text-white">
                            <a class="nav-link text-white" href="#" onclick="logout()">Logout</a>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
        <h3 class="pt-2">
            Create Course
        </h3>
        <hr>
        <div>
            <div class="mb-3 mt-3">
                <label for="" class="form-label">Course type</label>
                <select class="form-select form-select-lg" id="CourseType">                    
                </select>
            </div>
            <div class="mb-3 mt-3 input-control">
                <label for="" class="form-label">Course name</label>
                <input type="text" class="form-control form-control-lg" id="CourseName" placeholder="Enter course name">
                <div class="error text-danger small"></div>
            </div>
            <div class="mb-3 mt-3 input-control">
                <label for="" class="form-label">Hour</label>
                <input type="text" class="form-control form-control-lg" id="Hour" placeholder="Enter hour">
                <div class="error text-danger small"></div>
            </div>            
            <div class="mb-3 mt-3 text-center">
                <button type="button" class="btn btn-danger px-5" onclick="clearForm()">Clear</button>
                <button type="button" class="btn btn-primary px-5" onclick="createCourse()">Create</button>
            </div>
            <div class="mb-3 mt-3 text-center" id="MsgArea">
                
            </div>
        </div>
    </div>
