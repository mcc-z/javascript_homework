<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List w/ jQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/student.js"></script>
</head>
<body>
    <div class="container">
        <h3>Student List</h3>
        <hr>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="student_list.html">Student List</a></li>
            <li class="breadcrumb-item active">Student List by jQuery</li>
            <li class="breadcrumb-item"><a href="student_list2.html">Student List 2</a></li>
            <li class="breadcrumb-item"><a href="student_list3.html">Student List 3</a></li>
        </ul>
        <table id="myTable" class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th class="text-center">No</th>
                    <th class="text-center">Student Code</th>
                    <th>
                        <div class="d-flex justify-content-between">
                            <div>FullName</div>
                            <div>[Sex]</div>
                        </div>
                    </th>
                    <th class="text-center">Contact</th>
                    <th class="text-center">On/Off</th>
                    <th class="text-center">Delete</th>
                    <th class="text-center">Edit</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- generated from jquery (student_list1.js) -->
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="ModalOnOff">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">Modal OnOff</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="ModalOnOff_Val">
                    Modal body
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="ModalDelete">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">Modal Delete</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="ModalDelete_Val">
                    Are you sure you want to delete this record?
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal" id="BtDeleteYes" style="width:100px">Yes</button>
                    <button type="button" class="btn btn-dark" data-bs-dismiss="modal" style="width:100px">Close</button>
                </div>
                
            </div>
        </div>
    </div>

    <div class="modal fade" id="ModalEdit">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">Modal Edit</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="ModalBody_Edit">
                    Modal body
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>
</body>
</html>

<script src="js/student_list1.js"></script>
