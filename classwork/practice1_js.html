<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        button {
            padding: 10px;
            width: 120px;
            margin: 10px;
        }
        button:hover {
            background-color: rgb(193, 193, 193);
        }
    </style>
</head>

<body style="text-align: center;">
    <header style="margin-bottom: 20px; background-color: black; color: white; padding: 20px;">
        <h1>Practice</h1>
    </header>

    <form id="form1" action="" method="post">
        <button type="button" onclick="show_alert(msg)">Message</button><br><br>

        <button type="button" onclick="document.getElementById('show_sum').innerHTML = 'The sum is: ' + sum">Addition</button><br>
        <p id="show_sum"></p>

        <button type="button" onclick="document.getElementById('show_grade').innerHTML = 'The grade is: ' + grade">Score</button><br>
        <p id="show_grade"></p>

        <button value="Class" hidden></button>
        <button value="is" hidden></button>
        <button value="over!" hidden></button>
    </form>

    <div>
        <img id="image_id" src="/resources/calm.cat_.avif" width="500px">
    </div>
    <button type="button" onclick="change_image('/resources/calm.cat_.avif')">Pic1</button> | <button type="button" onclick="change_image('/resources/tiger1.jpeg')">Pic2</button> | <button type="button" onclick="change_image('/resources/lion1.jpg')">Pic3</button><br>
    <button type="button" onclick="change_border(0)">Border 0</button> | <button type="button" onclick="change_border(10)">Border 10</button> | <button type="button" onclick="change_border(20)">Border 20</button><br>
    <button type="button" onclick="change_opacity(1)">Opacity 100</button> | <button type="button" onclick="change_opacity(0.5)">Opacity 50</button> | <button type="button" onclick="change_opacity(0)">Opacity 0</button>

    <div>
        <h3 id="change_me" class="changed">Click the button to change this text by ID!</h3>
        <button type="button" onclick="changeById()">Change by ID</button>
        <h3 class="changed">Click the button to change this text by Tag Name!</h3>
        <button type="button" onclick="changeByTag()">Change by Tag</button>
        <h3 class="changed">Click the button to change this text by Class Name!</h3>
        <button type="button" onclick="changeByClass()">Change by Class</button>
    </div>

    <div>
        <button type="submit" onclick="changeByHTMLObjCol()">HTML Object Collection</button>
        <p id="html_obj_coll"></p>
    </div>

    <div>
        <p id="rest_param"></p>
    </div>

    <script>
        let sum = 0;
        let msg = "Alert! Error!";
        let num1 = 1;
        let num2 = 5;
        let num3 = 4;
        let score = 87;
        sum = addition(num1, num2, num3);
        let grade = pass_fail(score);

        function show_alert(msg) {
            alert("Your message: " + msg);
        }
        function addition(num1, num2, num3) {
            return num1 + num2 + num3;
        }
        function pass_fail(score) {
            if (score >= 60) return "Pass";
            else return "Fail";
        }

        function change_image(image){
            document.getElementById('image_id').src=image;
        }
        function change_border(border_size){
            document.getElementById('image_id').border=border_size;
        }
        function change_opacity(opacity){
            document.getElementById('image_id').style.opacity=opacity;
        }
        
        function changeById(){
            document.getElementById('change_me').innerHTML="Woohoo! I'm finally free!";
        }
        function changeByTag(){
            document.getElementsByTagName('h3')[1].innerHTML="Help! I'm being kidnapped!";
        }
        function changeByClass(){
            document.getElementsByClassName('changed')[2].innerHTML="Look for inner peace.";
        }
        
        // getElementById, getElementsByClassName, and getElementsByTagName are all simple, and can only select items within their specifications.
        // Ex: document.getElementById('change_me') | document.getElementsByTagName('h3')[1] | document.getElementsByClassName('changed')[2]
        
        // document.querySelector can be much more flexible and specific when calling for an item
        // Ex: const nested = document.querySelector("#main p") -> selects the 1st <p> tag in the <div> with the id #main
        // querySelector will ALWAYS select the first element that matches the specifications (from top to bottom)
        // you can also use querySelectorAll to grab ALL elements with matching specifications

        // grab elements by html object collections (ex: form, table, div - basically, the parent element)
        function changeByHTMLObjCol() {
            x = document.forms['form1'];
            let text = "";
            for (let i = 0; i < x.length; i++) {
                // takes the value="..." from every element found in form1 and puts it into "text" with a space between each value
                text += x.elements[i].value + " ";
            }
            return document.getElementById('html_obj_coll').innerHTML = text;
        }

        function product(...args) {
            let total = 0;
            if (args.length > 0) total = 1;
            for (let arg of args) total *= arg;
            return total;
        }
        document.getElementById('rest_param').innerHTML = 'Total of rest param: ' + product(34, 4, 2, 78);

    </script>

    <footer style="margin-top: 20px; background-color: black; color: white; padding: 20px;">
        <p>&copy; Sok Muoychou, 2026</p>
    </footer>
</body>
</html>
